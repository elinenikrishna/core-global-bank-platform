server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /
spring:
  application:
    name: transfer-service
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:transfer;MODE=Oracle;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${DATABASE_SCHEMA:PUBLIC}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
core:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      show-details: always
springdoc:
  swagger-ui:
    path: /swagger-ui.html
logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"transfer-service","correlationId":"%X{correlationId}","thread":"%thread","logger":"%logger{24}","message":"%msg"}%n'
