x-service-defaults: &service-defaults
  restart: unless-stopped
  environment: &service-env
    DATABASE_URL: jdbc:postgresql://postgres:5432/coreglobal
    DATABASE_USERNAME: coreglobal
    DATABASE_PASSWORD: coreglobal_local_only
    DATABASE_SCHEMA: CGB
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_ENABLED: "true"
    DDL_AUTO: update
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_started
  networks: [core-network]

services:
  web:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api-gateway]
    networks: [core-network]

  api-gateway:
    <<: *service-defaults
    build: ./backend/api-gateway
    ports: ["8080:8080"]

  auth-service:
    <<: *service-defaults
    build: ./backend/auth-service
    ports: ["8081:8081"]
  customer-service:
    <<: *service-defaults
    build: ./backend/customer-service
    ports: ["8082:8082"]
  account-service:
    <<: *service-defaults
    build: ./backend/account-service
    ports: ["8083:8083"]
  transaction-service:
    <<: *service-defaults
    build: ./backend/transaction-service
    ports: ["8084:8084"]
  transfer-service:
    <<: *service-defaults
    build: ./backend/transfer-service
    ports: ["8085:8085"]
  card-service:
    <<: *service-defaults
    build: ./backend/card-service
    ports: ["8086:8086"]
  offers-service:
    <<: *service-defaults
    build: ./backend/offers-service
    ports: ["8087:8087"]
  notification-service:
    <<: *service-defaults
    build: ./backend/notification-service
    ports: ["8088:8088"]
  fraud-detection-service:
    <<: *service-defaults
    build: ./backend/fraud-detection-service
    ports: ["8089:8089"]
  chatbot-service:
    <<: *service-defaults
    build: ./backend/chatbot-service
    ports: ["8090:8090"]
  admin-service:
    <<: *service-defaults
    build: ./backend/admin-service
    ports: ["8091:8091"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coreglobal
      POSTGRES_USER: coreglobal
      POSTGRES_PASSWORD: coreglobal_local_only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./platform/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreglobal -d coreglobal"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [core-network]

  kafka:
    image: apache/kafka:3.8.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [core-network]

  cassandra:
    image: cassandra:5.0
    ports: ["9042:9042"]
    environment:
      CASSANDRA_CLUSTER_NAME: CoreGlobalEventStore
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./platform/cassandra/schema.cql:/opt/core/schema.cql:ro
    networks: [core-network]

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [core-network]

volumes:
  postgres-data:
  cassandra-data:
  redis-data:

networks:
  core-network:
    driver: bridge

